<!DOCTYPE html>
<html lang="en" data-theme="paper">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>U.G. Krishnamurti — Collected Works</title>
<meta name="description" content="A reading edition of the six principal books of U.G. Krishnamurti.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="mask-icon" href="favicon.svg" color="#9c3618">
<meta name="theme-color" content="#9c3618">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Hanken+Grotesk:wght@400;500;600;700&family=Noto+Serif+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <div id="progress" class="progress-bar" aria-hidden="true"><span></span></div>

  <header id="topbar" class="topbar" data-context="library">
    <a class="brand" href="#/" aria-label="Library home">
      <span class="brand-mark">U·G</span>
      <span class="brand-text">Krishnamurti</span>
    </a>
    <div class="topbar-center" id="topbar-title"></div>
    <div class="topbar-actions">
      <button class="icon-btn" id="toc-btn" title="Contents (t)" aria-label="Contents" hidden>
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M4 6h16M4 12h16M4 18h10" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
      <button class="icon-btn" id="settings-btn" title="Reading settings" aria-label="Reading settings">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M5 7h14M5 12h14M5 17h14" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/><circle cx="9" cy="7" r="2.4" fill="currentColor"/><circle cx="15" cy="12" r="2.4" fill="currentColor"/><circle cx="8" cy="17" r="2.4" fill="currentColor"/></svg>
      </button>
    </div>
  </header>

  <main id="app"></main>

  <!-- Contents drawer -->
  <aside id="toc-drawer" class="drawer" aria-hidden="true">
    <div class="drawer-head">
      <span class="eyebrow">Contents</span>
      <button class="icon-btn" id="toc-close" aria-label="Close contents">
        <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 6l12 12M18 6L6 18" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="drawer-body" id="toc-list"></div>
  </aside>

  <!-- Settings popover -->
  <div id="settings-panel" class="popover" aria-hidden="true">
    <div class="pop-row">
      <span class="pop-label">Language</span>
      <div class="seg" id="lang-seg">
        <button data-lang="en">EN</button>
        <button data-lang="bi">雙語</button>
        <button data-lang="zh">中文</button>
      </div>
    </div>
    <div class="pop-row">
      <span class="pop-label">Theme</span>
      <div class="seg" id="theme-seg">
        <button data-theme="paper">Paper</button>
        <button data-theme="sepia">Sepia</button>
        <button data-theme="ink">Ink</button>
      </div>
    </div>
    <div class="pop-row">
      <span class="pop-label">Type size</span>
      <div class="seg" id="size-seg">
        <button data-size="-1">A−</button>
        <button data-size="0">A</button>
        <button data-size="1">A+</button>
        <button data-size="2">A++</button>
      </div>
    </div>
    <div class="pop-row">
      <span class="pop-label">Reading face</span>
      <div class="seg" id="face-seg">
        <button data-face="serif">Serif</button>
        <button data-face="sans">Sans</button>
      </div>
    </div>
    <div class="pop-row stack">
      <span class="pop-label">Column</span>
      <div class="seg" id="measure-seg">
        <button data-measure="narrow">Narrow</button>
        <button data-measure="normal">Normal</button>
        <button data-measure="wide">Wide</button>
        <button data-measure="wider">Wider</button>
      </div>
    </div>
    <div class="pop-row stack" id="tts-row" hidden>
      <span class="pop-label">Read aloud · voice</span>
      <select class="voice-select" id="voice-sel" aria-label="Narration voice"></select>
      <div class="seg" id="rate-seg" style="margin-top:.55rem">
        <button data-rate="0.8">0.8×</button>
        <button data-rate="1">1×</button>
        <button data-rate="1.15">1.15×</button>
        <button data-rate="1.3">1.3×</button>
      </div>
    </div>
    <div class="pop-tip">
      <span class="pop-label">Reading</span>
      <p><kbd>Space</kbd> or click the side margin → next paragraph.<br>
         <kbd>⇧&nbsp;Shift</kbd>+<kbd>Space</kbd> → previous paragraph.<br>
         <kbd>P</kbd> or the <b>Listen</b> button → read aloud from here.</p>
    </div>
  </div>

  <!-- Read-aloud control -->
  <div id="tts-bar" class="tts-bar" data-state="idle" hidden>
    <button class="tts-toggle" id="tts-toggle" aria-label="Read aloud">
      <svg class="i-play" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M8 5.5v13l11-6.5z" fill="currentColor"/></svg>
      <svg class="i-pause" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><rect x="6.5" y="5.5" width="3.6" height="13" rx="1" fill="currentColor"/><rect x="13.9" y="5.5" width="3.6" height="13" rx="1" fill="currentColor"/></svg>
    </button>
    <span class="tts-wave" aria-hidden="true"><i></i><i></i><i></i><i></i></span>
    <span class="tts-label" id="tts-label">Listen</span>
    <button class="tts-stop" id="tts-stop" aria-label="Stop reading" title="Stop">
      <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true"><rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor"/></svg>
    </button>
  </div>

  <div id="scrim" class="scrim" hidden></div>

  <script src="data.js"></script>
  <script src="data.zh.js"></script>
  <script src="app.js"></script>
</body>
</html>
